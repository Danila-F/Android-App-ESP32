name: Android CI

on:
  push:
    branches: [ main, "feature/**", "codex/**", gh-actions ]
  pull_request:
    branches: [ main ]

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Decode CI signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p app/signing
          for secret_name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              echo "$secret_name repository secret is missing"
              exit 1
            fi
          done
          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > app/signing/upload.jks
          test -s app/signing/upload.jks

      - name: Build signed debug APK
        run: |
          gradle :app:assembleDebug \
            -PANDROID_KEYSTORE_PATH="$GITHUB_WORKSPACE/app/signing/upload.jks" \
            -PANDROID_KEYSTORE_PASSWORD="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -PANDROID_KEY_ALIAS="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -PANDROID_KEY_PASSWORD="${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --stacktrace

      - name: Upload signed debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-app-signed-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
